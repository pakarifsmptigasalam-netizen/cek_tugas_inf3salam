<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Tugas Informatika - SMPN 3 Salam</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 14px; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus { border-color: #3498db; outline: none; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background 0.3s; }
        button:hover { background: #219150; }
        #loading { display: none; text-align: center; margin-top: 15px; color: #3498db; font-weight: bold; }
        #hasil { margin-top: 25px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nama-siswa { background: #3498db; color: white; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { border: 1px solid #dfe6e9; padding: 12px; text-align: left; font-size: 15px; }
        th { background-color: #f8f9fa; color: #636e72; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .status-cek { font-weight: bold; text-align: center; }
        .sudah, .selesai { color: #27ae60; background: #eafaf1; }
        .belum, .proses { color: #e67e22; background: #fef5e7; }
        .belum-dikerjakan { color: #e74c3c; background: #fdedec; }
    </style>
</head>
<body>

<div class="container">
    <h2>Info Tugas</h2>
    <p class="subtitle">Informatika - Fase D (SMPN 3 Salam)</p>
    <div class="input-group">
        <input type="number" id="inputNIS" placeholder="Masukkan NIS (Contoh: 4480)" onkeypress="if(event.keyCode === 13) cekTugas()">
    </div>
    <button onclick="cekTugas()">Cek Sekarang</button>
    <div id="loading">Menghubungkan ke database...</div>
    <div id="hasil">
        <div id="namaSiswa" class="nama-siswa"></div>
        <table>
            <thead>
                <tr><th>Materi</th><th>Status</th></tr>
            </thead>
            <tbody id="isiTabel"></tbody>
        </table>
    </div>
</div>

<script>
    async function cekTugas() {
        const nisInput = document.getElementById('inputNIS').value.trim();
        const hasilDiv = document.getElementById('hasil');
        const loading = document.getElementById('loading');
        const isiTabel = document.getElementById('isiTabel');
        
        // URL Apps Script Terbaru Bapak
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbxmvw6Boukuc9fO1MQA6-Qm58BWjFMOo1p5RrIA9PskwbqcyW2TeZcka3-hyyR8RlgV/exec';

        if(!nisInput) return alert("Isi NIS dulu, Pak!");

        loading.style.display = "block";
        hasilDiv.style.display = "none";

        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            const siswa = data.find(s => String(s.nis) === nisInput);

            loading.style.display = "none";

            if(siswa) {
                document.getElementById('namaSiswa').innerText = siswa.nama;
                isiTabel.innerHTML = "";
                
                for (const [judul, status] of Object.entries(siswa.tugas)) {
                    const row = isiTabel.insertRow();
                    const s = (status || "").toLowerCase();
                    
                    // Menentukan class warna berdasarkan teks di spreadsheet
                    let statusClass = "status-cek";
                    if (s.includes("selesai") || s.includes("sudah")) statusClass += " selesai";
                    else if (s.includes("proses")) statusClass += " proses";
                    else if (s.includes("belum")) statusClass += " belum-dikerjakan";

                    row.innerHTML = `<td>${judul}</td><td class="${statusClass}">${status || '-'}</td>`;
                }
                hasilDiv.style.display = "block";
            } else {
                alert("NIS " + nisInput + " tidak ditemukan.");
            }
        } catch (error) {
            loading.style.display = "none";
            alert("Koneksi gagal. Pastikan Spreadsheet sudah dibagikan ke 'Anyone with the link' dan Apps Script sudah di-Deploy.");
        }
    }
</script>
</body>
</html>
