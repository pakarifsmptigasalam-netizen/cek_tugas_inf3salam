<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Tugas Siswa</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #1a73e8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #hasil { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; background: #f8f9fa; }
        .loading { text-align: center; display: none; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h2>Info Tugas</h2>
    <input type="text" id="inputNIS" placeholder="Masukkan NIS Siswa (Contoh: 4480)">
    <button onclick="cek()">Cek Sekarang</button>
    
    <div id="loading" class="loading">Sabar ya, sedang mengambil data...</div>
    <div id="hasil"></div>
</div>

<script>
    async function cek() {
        const nis = document.getElementById('inputNIS').value.trim();
        const hasil = document.getElementById('hasil');
        const loading = document.getElementById('loading');
        
        if(!nis) return alert("Isi NIS dulu, Pak!");

        loading.style.display = "block";
        hasil.style.display = "none";

        try {
            // TEMPEL URL HASIL DEPLOY BAPAK DI SINI
            const webAppUrl = 'MASUKKAN_URL_EXEC_DI_SINI';
            
            const response = await fetch(webAppUrl);
            const data = await response.json();
            
            const siswa = data.find(s => s.nis === nis);
            
            loading.style.display = "none";
            hasil.style.display = "block";

            if(siswa) {
                hasil.innerHTML = `<strong>Nama:</strong> ${siswa.nama}<br>
                                   <strong>Status:</strong> ${siswa.status}`;
            } else {
                hasil.innerHTML = `<span style="color:red">NIS ${nis} tidak ditemukan.</span>`;
            }
        } catch (err) {
            loading.style.display = "none";
            alert("Koneksi gagal. Cek kembali URL Apps Script.");
        }
    }
</script>

</body>
</html>
